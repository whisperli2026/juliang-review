<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚量 · 头客竞价直播复盘中心</title>
<style>
:root{
  --blue:#2176d2; --blue-2:#4a90e2; --blue-3:#7ec0ee; --blue-soft:#e8f1fb;
  --bg:#f4f8fd; --card:#ffffff; --text:#1e293b; --muted:#64748b;
  --border:#e2e8f0; --border-soft:#eef4fa; --good:#2eb872;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; line-height:1.6;}
.hero{background:linear-gradient(135deg,#4a90e2 0%,#5fa8e8 50%,#7ec0ee 100%);
  color:#fff; padding:54px 24px 60px; text-align:center;}
.hero h1{font-size:27px; font-weight:800; letter-spacing:.5px; margin-bottom:12px;}
.hero p{font-size:15px; opacity:.94; font-weight:400;}
.hero .tag{display:inline-block; margin-top:18px; background:rgba(255,255,255,.2);
  padding:5px 16px; border-radius:20px; font-size:12.5px; backdrop-filter:blur(4px);}
.wrap{max-width:900px; margin:-34px auto 0; padding:0 20px 60px;}
.section-title{font-size:14px; color:var(--muted); font-weight:600; margin:34px 4px 16px;
  display:flex; align-items:center; gap:8px;}
.section-title::before{content:""; width:4px; height:15px; background:var(--blue); border-radius:2px;}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:18px;}
.card{background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:24px 22px; text-decoration:none; color:inherit; display:block;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease; position:relative; overflow:hidden;}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg,#4a90e2,#7ec0ee);}
.card:hover{transform:translateY(-4px); box-shadow:0 12px 28px rgba(74,144,226,.18);
  border-color:var(--blue-3);}
.card .period{font-size:12px; color:var(--blue); font-weight:700; background:var(--blue-soft);
  display:inline-block; padding:3px 10px; border-radius:6px; margin-bottom:14px;}
.card h3{font-size:17px; font-weight:700; margin-bottom:8px; line-height:1.4;}
.card .desc{font-size:13px; color:var(--muted); margin-bottom:18px; min-height:40px;}
.card .foot{display:flex; align-items:center; justify-content:space-between;
  font-size:12px; color:var(--muted); border-top:1px solid var(--border-soft); padding-top:14px;}
.card .go{color:var(--blue); font-weight:700; font-size:13px;}
.card .go::after{content:" →"; transition:margin .18s ease;}
.card:hover .go::after{margin-left:4px;}
.card.soon{opacity:.72; pointer-events:none; background:#fafcfe;}
.card.soon::before{background:linear-gradient(180deg,#cbd5e1,#e2e8f0);}
.card.soon .period{color:var(--muted); background:#f1f5f9;}
.card.soon .badge-soon{background:#f1f5f9; color:var(--muted); padding:3px 10px; border-radius:6px; font-size:12px; font-weight:600;}
.card.monitor{border-color:#c7d9f0; background:linear-gradient(135deg,#f0f7ff 0%,#ffffff 100%);}
.card.monitor::before{background:linear-gradient(180deg,#3b82f6,#06b6d4);}
.card.monitor .period{color:#0891b2; background:#e0f7fa;}
.card.monitor .go{color:#0891b2;}
.footer{text-align:center; color:var(--muted); font-size:12px; margin-top:48px; padding:0 20px;}
@media(max-width:560px){ .hero h1{font-size:22px} .hero{padding:42px 18px 52px} }
</style>
</head>
<body>
<div class="hero">
  <h1>聚量 · 头客竞价直播复盘中心</h1>
  <p>数码家电行业 · 竞价直播投放复盘报告</p>
  <div class="tag">持续更新 · 点击任意卡片查看对应周期报告</div>
</div>

<div class="wrap">
  <div class="section-title">复盘报告</div>
  <div class="grid" id="grid"></div>

  <div class="section-title">日常监控</div>
  <div class="grid">
    <a class="card monitor" href="https://ams-003c.github.io/client-dashboard/juliang.html" target="_blank" rel="noopener noreferrer">
      <span class="period">每日更新</span>
      <h3>📊 每日监控看板</h3>
      <div class="desc">实时追踪投放消耗、掉量预警、重点客户日维度数据，支持每日追击与归因复盘。</div>
      <div class="foot"><span>数据每日自动刷新</span><span class="go">打开看板</span></div>
    </a>
  </div>

  <div class="footer">如需数据说明或补充分析，请随时联系投放团队 · 报告仅供聚量内部与合作方参考</div>
</div>

<script>
const REPORTS = [
  {
    period: "2026 · 5月",
    title: "倍宠 · 直播间维度复盘",
    range: "5/25 ~ 6/7",
    desc: "客户维度直播间复盘：本期日均消耗 37.6 万（环比 −16.2%），聚焦 CVR 下滑归因与直播间人货场打法。",
    url: "2026-05/",
    date: "2026-06-08 更新",
    ready: true
  },
  {
    period: "2026 · 6月",
    title: "6月下旬双周复盘",
    range: "6/17 ~ 6/30",
    desc: "近双周量级上台阶（26→38.8万，+49%），聚焦头部直播间异动、人货场深拆与提量打法。",
    url: "2026-06/",
    date: "2026-07-01 更新",
    ready: true
  },
  {
    period: "2026 · 7月",
    title: "7月复盘",
    range: "敬请期待",
    desc: "7月周期复盘报告将在月末汇总后上线。",
    url: "#",
    date: "即将上线",
    ready: false
  }
];

const grid = document.getElementById('grid');
grid.innerHTML = REPORTS.map(r => r.ready ? `
  <a class="card" href="${r.url}">
    <span class="period">${r.period}</span>
    <h3>${r.title}</h3>
    <div class="desc">${r.desc}</div>
    <div class="foot"><span>${r.range} · ${r.date}</span><span class="go">查看报告</span></div>
  </a>` : `
  <div class="card soon">
    <span class="period">${r.period}</span>
    <h3>${r.title}</h3>
    <div class="desc">${r.desc}</div>
    <div class="foot"><span>${r.range}</span><span class="badge-soon">即将上线</span></div>
  </div>`).join('');
</script>
</body>
</html>
