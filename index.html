<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚量 · 头客竞价直播复盘中心</title>
<style>
:root{
  --blue-1:#0a1f4d; --blue-2:#1e3a8a; --blue-3:#3b82f6; --blue-4:#60a5fa; --blue-5:#93c5fd;
  --bg-1:#020617; --bg-2:#0a1f4d; --bg-3:#1e3a8a;
  --text:#f1f5f9; --text-soft:#cbd5e1; --muted:#94a3b8;
  --glass:rgba(255,255,255,.08); --glass-border:rgba(255,255,255,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg-1);
  background:
    radial-gradient(ellipse 800px 500px at 15% 10%, rgba(96,165,250,.28), transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 30%, rgba(139,92,246,.22), transparent 60%),
    radial-gradient(ellipse 900px 600px at 50% 90%, rgba(34,211,238,.18), transparent 60%),
    linear-gradient(135deg, #020617 0%, #0a1f4d 50%, #1e3a8a 100%);
  background-attachment:fixed;
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
  min-height:100vh;
}
/* 星空粒子 */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.35), transparent),
    radial-gradient(1.5px 1.5px at 80% 20%, rgba(147,197,253,.6), transparent),
    radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,.4), transparent),
    radial-gradient(1px 1px at 90% 60%, rgba(147,197,253,.5), transparent),
    radial-gradient(1.2px 1.2px at 10% 65%, rgba(255,255,255,.45), transparent),
    radial-gradient(1px 1px at 45% 15%, rgba(255,255,255,.3), transparent),
    radial-gradient(1.5px 1.5px at 70% 90%, rgba(147,197,253,.5), transparent);
  background-size:100% 100%;
  opacity:.85;
}
.hero{
  position:relative; z-index:1;
  background:linear-gradient(135deg, rgba(59,130,246,.15) 0%, rgba(139,92,246,.12) 50%, rgba(34,211,238,.15) 100%);
  border-bottom:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  color:#fff; padding:60px 24px 64px; text-align:center;
}
.hero h1{
  font-size:30px; font-weight:800; letter-spacing:1px; margin-bottom:12px;
  background:linear-gradient(135deg, #93c5fd 0%, #c4b5fd 50%, #67e8f9 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(147,197,253,.3);
}
.hero p{font-size:15px; color:var(--text-soft); font-weight:400;}
.hero .tag{
  display:inline-block; margin-top:18px;
  background:linear-gradient(135deg, rgba(59,130,246,.25), rgba(139,92,246,.25));
  border:1px solid var(--glass-border);
  padding:6px 18px; border-radius:24px; font-size:12.5px; color:var(--text-soft);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.wrap{position:relative; z-index:1; max-width:1000px; margin:-32px auto 0; padding:0 22px 60px;}
.section-title{
  font-size:14px; color:var(--text-soft); font-weight:600; margin:38px 4px 18px;
  display:flex; align-items:center; gap:10px; letter-spacing:.5px;
}
.section-title::before{
  content:""; width:4px; height:18px;
  background:linear-gradient(180deg, #60a5fa, #c4b5fd);
  border-radius:2px;
  box-shadow:0 0 12px rgba(96,165,250,.6);
}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px;}
.card{
  position:relative; overflow:hidden;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:18px; padding:26px 24px;
  text-decoration:none; color:inherit; display:block;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.card::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:5px;
  background:linear-gradient(180deg, #60a5fa, #a78bfa);
}
.card::after{
  content:""; position:absolute; right:-50px; top:-50px; width:180px; height:180px;
  background:radial-gradient(circle, rgba(96,165,250,.25), transparent 70%);
  border-radius:50%; transition:transform .35s ease;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(59,130,246,.35), 0 0 0 1px rgba(147,197,253,.4);
  border-color:rgba(147,197,253,.5);
}
.card:hover::after{transform:scale(1.3);}

/* 5月 · 紫蓝主题 */
.card.theme-may::before{background:linear-gradient(180deg, #a78bfa, #ec4899);}
.card.theme-may .period{color:#e9d5ff; background:rgba(168,85,247,.2); border:1px solid rgba(168,85,247,.4);}
.card.theme-may:hover{box-shadow:0 18px 40px rgba(168,85,247,.4), 0 0 0 1px rgba(196,181,253,.5); border-color:rgba(196,181,253,.5);}
.card.theme-may:hover::after{background:radial-gradient(circle, rgba(168,85,247,.4), transparent 70%);}
.card.theme-may .go{color:#c4b5fd;}

/* 6月 · 深蓝主题 */
.card.theme-jun::before{background:linear-gradient(180deg, #60a5fa, #06b6d4);}
.card.theme-jun .period{color:#bae6fd; background:rgba(59,130,246,.2); border:1px solid rgba(59,130,246,.4);}
.card.theme-jun:hover{box-shadow:0 18px 40px rgba(59,130,246,.45), 0 0 0 1px rgba(147,197,253,.5); border-color:rgba(147,197,253,.5);}
.card.theme-jun:hover::after{background:radial-gradient(circle, rgba(59,130,246,.45), transparent 70%);}
.card.theme-jun .go{color:#7dd3fc;}

/* 7月 · 青绿主题（灰未来） */
.card.theme-jul::before{background:linear-gradient(180deg, #94a3b8, #64748b);}
.card.theme-jul .period{color:#e2e8f0; background:rgba(148,163,184,.18); border:1px solid rgba(148,163,184,.35);}
.card.theme-jul:hover{box-shadow:0 18px 40px rgba(34,211,238,.3), 0 0 0 1px rgba(103,232,249,.4); border-color:rgba(103,232,249,.4);}
.card.theme-jul:hover::after{background:radial-gradient(circle, rgba(34,211,238,.3), transparent 70%);}
.card.theme-jul .go{color:#94a3b8;}

/* 监控看板 · 青色到紫色渐变 */
.card.theme-monitor::before{background:linear-gradient(180deg, #34d399, #06b6d4, #a78bfa);}
.card.theme-monitor .period{color:#a7f3d0; background:rgba(16,185,129,.2); border:1px solid rgba(16,185,129,.4);}
.card.theme-monitor:hover{box-shadow:0 18px 40px rgba(16,185,129,.4), 0 0 0 1px rgba(167,243,208,.5); border-color:rgba(167,243,208,.5);}
.card.theme-monitor:hover::after{background:radial-gradient(circle, rgba(16,185,129,.45), transparent 70%);}
.card.theme-monitor .go{color:#6ee7b7;}

.card .period{
  font-size:12px; font-weight:700;
  display:inline-block; padding:4px 12px; border-radius:8px; margin-bottom:14px;
  letter-spacing:.5px;
}
.card h3{font-size:18px; font-weight:700; margin-bottom:10px; line-height:1.4; color:#fff;}
.card .desc{font-size:13px; color:var(--text-soft); margin-bottom:20px; min-height:42px; line-height:1.7;}
.card .foot{
  display:flex; align-items:center; justify-content:space-between;
  font-size:12px; color:var(--muted);
  border-top:1px solid var(--glass-border); padding-top:14px;
}
.card .go{font-weight:700; font-size:13px;}
.card .go::after{content:" →"; transition:margin .25s ease;}
.card:hover .go::after{margin-left:6px;}
.card.soon{opacity:.85;}
.card.soon::before{background:linear-gradient(180deg, #94a3b8, #64748b);}
.card.soon .badge-soon{
  background:rgba(148,163,184,.15); color:var(--text-soft);
  padding:3px 10px; border-radius:6px; font-size:12px; font-weight:600;
  border:1px solid rgba(148,163,184,.3);
}
.footer{
  text-align:center; color:var(--muted); font-size:12px; margin-top:56px; padding:0 20px;
  position:relative; z-index:1;
}
@media(max-width:560px){
  .hero h1{font-size:23px} .hero{padding:46px 18px 54px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="hero">
  <h1>聚量 · 头客竞价直播复盘中心</h1>
  <p>数码家电行业 · 竞价直播投放复盘报告</p>
  <div class="tag">持续更新 · 点击任意卡片查看对应周期报告</div>
</div>

<div class="wrap">
  <div class="section-title">复盘报告</div>
  <div class="grid" id="grid"></div>

  <div class="section-title">日常监控</div>
  <div class="grid">
    <a class="card theme-monitor" href="https://ams-003c.github.io/client-dashboard/juliang.html" target="_blank" rel="noopener noreferrer">
      <span class="period">每日更新</span>
      <h3>📊 每日监控看板</h3>
      <div class="desc">实时追踪投放消耗、掉量预警、重点客户日维度数据，支持每日追击与归因复盘。</div>
      <div class="foot"><span>数据每日自动刷新</span><span class="go">打开看板</span></div>
    </a>
  </div>

  <div class="footer">如需数据说明或补充分析，请随时联系投放团队 · 报告仅供聚量内部与合作方参考</div>
</div>

<script>
const REPORTS = [
  {
    period: "2026 · 5月",
    title: "5月底双周复盘",
    range: "5/25 ~ 6/7",
    desc: "客户维度直播间复盘：本期日均消耗 37.6 万（环比 −16.2%），聚焦 CVR 下滑归因与直播间人货场打法。",
    url: "2026-05/",
    date: "2026-06-08 更新",
    ready: true,
    theme: "theme-may"
  },
  {
    period: "2026 · 6月",
    title: "6月下旬双周复盘",
    range: "6/17 ~ 6/30",
    desc: "近双周量级上台阶（26→38.8万，+49%），聚焦头部直播间异动、人货场深拆与提量打法。",
    url: "2026-06/",
    date: "2026-07-01 更新",
    ready: true,
    theme: "theme-jun"
  },
  {
    period: "2026 · 7月",
    title: "7月复盘",
    range: "敬请期待",
    desc: "7月周期复盘报告将在月末汇总后上线。",
    url: "#",
    date: "即将上线",
    ready: false,
    theme: "theme-jul"
  }
];

const grid = document.getElementById('grid');
grid.innerHTML = REPORTS.map(r => r.ready ? `
  <a class="card ${r.theme}" href="${r.url}">
    <span class="period">${r.period}</span>
    <h3>${r.title}</h3>
    <div class="desc">${r.desc}</div>
    <div class="foot"><span>${r.range} · ${r.date}</span><span class="go">查看报告</span></div>
  </a>` : `
  <div class="card ${r.theme} soon">
    <span class="period">${r.period}</span>
    <h3>${r.title}</h3>
    <div class="desc">${r.desc}</div>
    <div class="foot"><span>${r.range}</span><span class="badge-soon">即将上线</span></div>
  </div>`).join('');
</script>
</body>
</html>
